# T13 — CI gate. Blocks merge on red typecheck / lint / unit tests (web +
# orchestrator + shared) and on a broken agentd (go vet / go test / cross-build).
# This mirrors `make verify` but runs natively on the runner (no Docker-in-Docker)
# for speed. Integration/e2e suites (need Postgres + sshd + chromium) are out of
# scope here and run separately.
name: CI

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · build · unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Scan Git history for secrets
        run: >-
          docker run --rm -v "$PWD:/repo:ro"
          zricethezav/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f
          git /repo --no-banner --redact

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 9.12.3

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate synchronized version
        run: pnpm release:check

      - name: Validate production Compose
        run: docker compose -f docker-compose.yml config --quiet

      - name: Check formatting
        run: pnpm format:check

      # Shared contracts must be built before the apps typecheck against its dist.
      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test:unit

      # Vuln gate: fail the build on a known-vulnerable production npm dependency
      # (high/critical). Keeps fastify/ws/drizzle/etc. patched over time.
      - name: Audit (npm)
        run: pnpm audit --prod --audit-level high

  agentd:
    name: agentd · vet · test · dist
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agentd
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25'
          cache-dependency-path: agentd/go.sum

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      # Vuln gate: scan agentd (and its module graph) for known Go CVEs that the
      # code actually reaches — including stdlib CVEs, which is why the build runs
      # on a current Go (1.25) toolchain.
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      # Cross-compile the release binaries the remote-node bootstrap ships, so a
      # build break (or a bad VERSION) is caught in CI, not at deploy time (T14).
      - name: make dist
        run: make dist
