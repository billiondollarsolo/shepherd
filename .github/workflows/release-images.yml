name: Release images

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Require a tagged commit from main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9.12.3

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.25'
          cache-dependency-path: agentd/go.sum

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Match tag to repository version
        env:
          EXPECTED_VERSION: ${{ github.ref_name }}
        run: node scripts/check-release-version.mjs

      - name: Verify portable deployment bundle
        run: scripts/test-deployment-bundle.sh

      - name: Verify TypeScript release
        run: |
          pnpm format:check
          pnpm -r build
          pnpm -r typecheck
          pnpm lint
          pnpm quality
          pnpm test:coverage

      # npm retired the legacy audit endpoint used by pnpm (HTTP 410). Scan the
      # immutable pnpm lockfile directly with Google's maintained OSV database.
      - name: Scan JavaScript dependencies with OSV
        run: |
          go run github.com/google/osv-scanner/v2/cmd/osv-scanner@v2.4.0 scan source \
            --lockfile=pnpm-lock.yaml --format=json --output-file=osv-report.json

      - name: Verify Chromium and mobile WebKit behavior
        run: |
          pnpm exec playwright install --with-deps chromium webkit
          pnpm test:e2e

      - name: Verify Go release
        working-directory: agentd
        run: |
          go vet ./...
          go install honnef.co/go/tools/cmd/staticcheck@v0.6.1
          staticcheck ./...
          go test -race ./...
          go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
          make dist

      - name: Run PostgreSQL and SSH integration suite
        run: |
          docker compose -f docker-compose.dev.yml build builder sshd
          docker compose -f docker-compose.dev.yml up -d --wait postgres sshd
          docker compose -f docker-compose.dev.yml run --rm builder sh -lc \
            'until [ -s /ssh-keys/id_test ]; do sleep 1; done; pnpm install --frozen-lockfile; pnpm --filter @flock/shared build; pnpm test:int'

      - name: Collect integration logs
        if: always()
        run: docker compose -f docker-compose.dev.yml logs --no-color > release-integration.log 2>&1 || true

      - name: Stop integration services
        if: always()
        run: docker compose -f docker-compose.dev.yml down --volumes --remove-orphans

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-validation
          path: |
            coverage/
            osv-report.json
            release-integration.log
          if-no-files-found: warn
          retention-days: 30

  candidate:
    name: Build candidate ${{ matrix.image }}
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: shepherd-orchestrator
            dockerfile: docker/Dockerfile.orchestrator
          - image: shepherd-node-runtime
            dockerfile: docker/Dockerfile.node-runtime
          - image: shepherd-web
            dockerfile: docker/Dockerfile.web
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
      CANDIDATE_TAG: candidate-${{ github.sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push immutable candidate
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}:${{ env.CANDIDATE_TAG }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.licenses=MIT
          build-args: |
            RELEASE_REFRESH=${{ github.run_id }}-${{ github.run_attempt }}
            IMAGE_VERSION=${{ github.ref_name }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: mode=max
          sbom: true

      - name: Record candidate digest
        run: |
          mkdir -p digests
          printf '%s\n' '${{ steps.push.outputs.digest }}' > 'digests/${{ matrix.image }}.digest'

      - name: Reject new or overdue high and critical image vulnerabilities
        run: |
          mkdir -p .trivy-cache trivy-reports
          for platform in linux/amd64 linux/arm64; do
            platform_slug="${platform//\//-}"
            docker pull --platform "$platform" "$IMAGE:$CANDIDATE_TAG"

            # Keep the complete unfiltered inventory as a release artifact.
            docker run --rm --user 0 \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$GITHUB_WORKSPACE/.trivy-cache:/root/.cache/trivy" \
              -v "$GITHUB_WORKSPACE/trivy-reports:/reports" \
              aquasec/trivy:0.66.0@sha256:086971aaf400beebd94e8300fd8ea623774419597169156cec56eec5b00dfb1e image \
              --platform "$platform" --scanners vuln --format json \
              --output "/reports/${{ matrix.image }}-${platform_slug}-full.json" \
              --severity HIGH,CRITICAL \
              "$IMAGE:$CANDIDATE_TAG"

            # The expiring register suppresses only reviewed, upstream-unfixed
            # findings. Any new finding—or expired review—fails the release.
            docker run --rm --user 0 \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$GITHUB_WORKSPACE/.trivy-cache:/root/.cache/trivy" \
              -v "$GITHUB_WORKSPACE:/workspace:ro" \
              aquasec/trivy:0.66.0@sha256:086971aaf400beebd94e8300fd8ea623774419597169156cec56eec5b00dfb1e image \
              --platform "$platform" \
              --exit-code 1 --quiet --scanners vuln \
              --ignorefile /workspace/.trivyignore.yaml \
              --severity HIGH,CRITICAL \
              "$IMAGE:$CANDIDATE_TAG"
          done

      - name: Upload digest
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-${{ matrix.image }}
          path: |
            digests/
            trivy-reports/
          retention-days: 30

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  upstream:
    name: Scan upstream ${{ matrix.name }}
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: PostgreSQL
            image: postgres:16-bookworm@sha256:92620daddcd947f8d5ab5ba66e848702fe443d87fed30c4cea8e389fd78dfc55
            report: postgres
          - name: Traefik
            image: traefik:v3.7@sha256:4299bbed850421258fc5448c2e0e6ad350981d4d335a68de11b92448aedbefe5
            report: traefik
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Pull and scan the exact upstream manifest
        env:
          IMAGE: ${{ matrix.image }}
          REPORT: ${{ matrix.report }}
        run: |
          set -euo pipefail
          mkdir -p .trivy-cache trivy-reports
          manifest_json="$(docker manifest inspect "$IMAGE")"
          repository="${IMAGE%%@*}"
          for platform in linux/amd64 linux/arm64; do
            platform_slug="${platform//\//-}"
            platform_os="${platform%/*}"
            platform_arch="${platform#*/}"
            platform_digest="$(
              jq -er --arg os "$platform_os" --arg arch "$platform_arch" \
                '[.manifests[] | select(.platform.os == $os and .platform.architecture == $arch) | .digest][0]' \
                <<<"$manifest_json"
            )"
            platform_image="$repository@$platform_digest"
            docker pull --platform "$platform" "$platform_image"
            docker run --rm --user 0 \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$GITHUB_WORKSPACE/.trivy-cache:/root/.cache/trivy" \
              -v "$GITHUB_WORKSPACE/trivy-reports:/reports" \
              aquasec/trivy:0.66.0@sha256:086971aaf400beebd94e8300fd8ea623774419597169156cec56eec5b00dfb1e image \
              --platform "$platform" --scanners vuln --format json \
              --output "/reports/${REPORT}-${platform_slug}-full.json" \
              --severity HIGH,CRITICAL "$platform_image"
            docker run --rm --user 0 \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$GITHUB_WORKSPACE/.trivy-cache:/root/.cache/trivy" \
              -v "$GITHUB_WORKSPACE:/workspace:ro" \
              aquasec/trivy:0.66.0@sha256:086971aaf400beebd94e8300fd8ea623774419597169156cec56eec5b00dfb1e image \
              --platform "$platform" --exit-code 1 --quiet --scanners vuln \
              --ignorefile /workspace/.trivyignore.yaml \
              --severity HIGH,CRITICAL "$platform_image"
          done

      - name: Upload upstream scan evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: upstream-${{ matrix.report }}-scan
          path: trivy-reports/
          if-no-files-found: warn
          retention-days: 30

  smoke:
    name: Smoke exact candidate images
    needs: [candidate, upstream]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: read
    env:
      CANDIDATE_TAG: candidate-${{ github.sha }}
      # Every compose invocation in this job, including the later forced
      # orchestrator recreation, must resolve to the exact candidate images.
      FLOCK_VERSION: candidate-${{ github.sha }}
      FLOCK_NODE_RUNTIME_VERSION: candidate-${{ github.sha }}
      FLOCK_IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
      HTTP_HOST_PORT: '18080'
      HTTPS_HOST_PORT: '18443'
      FLOCK_DOMAIN: localhost
      FLOCK_PREVIEW_DOMAIN: preview.localhost
      FLOCK_PREVIEW_BACKEND: hostname
      FLOCK_PREVIEW_EDGE_ENABLED: '1'
      FLOCK_PREVIEW_FRAME_SOURCES: https://*.preview.localhost:18443
      # CI uses Traefik's ephemeral generated certificate and curl --insecure;
      # production uses the configured HTTP-01 or DNS-01 resolver.
      FLOCK_TLS_CERT_RESOLVER: ''
      ACME_EMAIL: release@example.invalid
      PUBLIC_BASE_URL: https://localhost:18443
      FLOCK_ALLOWED_ORIGINS: https://localhost:18443
      FLOCK_INSTALL_CLAUDE_CODE: '0'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare isolated release secrets
        run: |
          mkdir -p secrets
          openssl rand -base64 32 > secrets/flock_master_key
          openssl rand -base64 32 > secrets/postgres_password
          openssl rand -base64 48 > secrets/setup_token
          chmod 600 secrets/*

      - name: Pull exact candidates
        run: |
          for image in shepherd-orchestrator shepherd-node-runtime shepherd-web; do
            docker pull "$FLOCK_IMAGE_REGISTRY/$image:$CANDIDATE_TAG"
          done
          docker compose pull postgres traefik

      - name: Verify previous-topology runtime migration
        run: scripts/test-node-runtime-migration.sh "$FLOCK_IMAGE_REGISTRY/shepherd-node-runtime:$CANDIDATE_TAG"

      - name: Start clean candidate stack
        run: docker compose up -d --no-build --wait postgres node-runtime orchestrator web traefik

      - name: Verify migrations, readiness, setup, login, and API
        run: |
          set -euo pipefail
          origin='https://localhost:18443'
          test "$(curl --silent --show-error -o /dev/null -w '%{redirect_url}' \
            http://localhost:18080/)" = "$origin/"
          curl --silent --show-error --insecure --head "$origin/" \
            | tr -d '\r' > release-edge-headers.txt
          grep -qi '^strict-transport-security:' release-edge-headers.txt
          grep -qi '^cross-origin-opener-policy: same-origin$' release-edge-headers.txt
          grep -qi '^content-security-policy:.*frame-src https://\*\.preview\.localhost:18443' \
            release-edge-headers.txt
          curl --fail --silent --show-error --insecure "$origin/health" | tee release-smoke.log
          docker compose exec -T orchestrator node -e \
            "fetch('http://127.0.0.1:8080/ready').then(async r => { console.log(await r.text()); process.exit(r.ok ? 0 : 1) })" \
            | tee -a release-smoke.log
          setup_token="$(cat secrets/setup_token)"
          jq -n --arg token "$setup_token" \
            '{username:"release-owner",password:"Release-Smoke-Only-2026!",setupToken:$token}' \
            | curl --fail --silent --show-error --insecure \
                -H "origin: $origin" \
                -H 'content-type: application/json' --data-binary @- \
                "$origin/api/auth/setup" | tee -a release-smoke.log
          curl --fail --silent --show-error --insecure -c release-cookies.txt \
            -H "origin: $origin" \
            -H 'content-type: application/json' \
            -d '{"username":"release-owner","password":"Release-Smoke-Only-2026!"}' \
            "$origin/api/auth/login" | tee -a release-smoke.log
          curl --fail --silent --show-error --insecure -b release-cookies.txt \
            "$origin/api/auth/me" | tee -a release-smoke.log
          curl --fail --silent --show-error --insecure "$origin/" \
            | grep -q '<div id="root">'
          docker compose exec -T node-runtime flock-agentd version | tee -a release-smoke.log
          {
            docker compose exec -T node-runtime gosu flock-agent codex --version
            docker compose exec -T node-runtime gosu flock-agent opencode --version
            docker compose exec -T node-runtime sh -lc 'gosu flock-agent claude --version 2>/dev/null || echo "claude: runtime installer disabled in candidate smoke"'
          } | tee agent-versions.txt | tee -a release-smoke.log
          curl --fail --silent --show-error --insecure -b release-cookies.txt \
            "$origin/api/diagnostics" | tee release-diagnostics.json

      - name: Verify isolated Remote Preview end to end
        run: |
          set -euo pipefail
          origin='https://localhost:18443'
          auth=(-b release-cookies.txt -H "origin: $origin")

          node_id="$(curl --fail --silent --show-error --insecure -b release-cookies.txt \
            "$origin/api/nodes" | jq -r '.nodes[] | select(.kind == "local") | .id' | head -n 1)"
          test -n "$node_id"

          project_id="$(jq -n --arg nodeId "$node_id" \
            '{nodeId:$nodeId,name:"release-preview",workingDir:"/home/flock-agent"}' \
            | curl --fail --silent --show-error --insecure "${auth[@]}" \
                -H 'content-type: application/json' --data-binary @- \
                "$origin/api/projects" | jq -r '.project.id')"
          test -n "$project_id"

          dev_command="node -e \"require('node:http').createServer((_req,res)=>res.end('shepherd-preview-ok')).listen(39001,'127.0.0.1')\""
          session_id="$(jq -n --arg projectId "$project_id" --arg devCommand "$dev_command" \
            '{projectId:$projectId,agentType:"dev",devCommand:$devCommand}' \
            | curl --fail --silent --show-error --insecure "${auth[@]}" \
                -H 'content-type: application/json' --data-binary @- \
                "$origin/api/sessions" | jq -r '.session.id')"
          test -n "$session_id"

          service_id="$(jq -n \
            '{targetHost:"127.0.0.1",targetPort:39001,protocol:"http",label:"Release Preview",autoForward:false}' \
            | curl --fail --silent --show-error --insecure "${auth[@]}" \
                -H 'content-type: application/json' --data-binary @- \
                "$origin/api/projects/$project_id/ports" | jq -r '.port.serviceId')"
          test -n "$service_id"

          status=''
          for _attempt in $(seq 1 30); do
            status="$(jq -n '{}' \
              | curl --silent --show-error --insecure "${auth[@]}" --data-binary @- \
                  -H 'content-type: application/json' \
                  -o release-preview.json -w '%{http_code}' \
                  "$origin/api/projects/$project_id/ports/$service_id/forward" || true)"
            [ "$status" = 201 ] && break
            sleep 1
          done
          test "$status" = 201

          launch_url="$(jq -r '.launchUrl' release-preview.json)"
          preview_origin="${launch_url%%/_shepherd/*}"
          preview_host="$(printf '%s' "$preview_origin" | sed -E 's#^https?://([^:/]+).*#\1#')"
          preview_token="${launch_url##*#token=}"
          test -n "$preview_host"
          test -n "$preview_token"

          preview_redirect="$(curl --silent --show-error \
            --resolve "$preview_host:18080:127.0.0.1" \
            -o /dev/null -w '%{redirect_url}' "http://$preview_host:18080/")"
          test "$preview_redirect" = "$preview_origin/"

          for internal_path in '/_shepherd/health' '/_shepherd/not-a-public-route'; do
            internal_status="$(curl --silent --show-error --insecure \
              --resolve "$preview_host:18443:127.0.0.1" \
              -o /dev/null -w '%{http_code}' "$preview_origin$internal_path")"
            test "$internal_status" = 404
          done

          jq -n --arg token "$preview_token" '{token:$token}' \
            | curl --fail --silent --show-error --insecure \
                --resolve "$preview_host:18443:127.0.0.1" \
                -c release-preview-cookies.txt \
                -H "origin: $preview_origin" \
                -H 'content-type: application/json' --data-binary @- \
                "$preview_origin/_shepherd/authorize"
          curl --fail --silent --show-error --insecure \
            --resolve "$preview_host:18443:127.0.0.1" \
            -b release-preview-cookies.txt "$preview_origin/" \
            | grep -q '^shepherd-preview-ok$'

          curl --fail --silent --show-error --insecure "${auth[@]}" -X DELETE \
            "$origin/api/projects/$project_id/ports/$service_id/forward" >/dev/null
          revoked_status="$(curl --silent --show-error --insecure \
            --resolve "$preview_host:18443:127.0.0.1" \
            -b release-preview-cookies.txt -o /dev/null -w '%{http_code}' \
            "$preview_origin/")"
          test "$revoked_status" = 404

          # Core lifecycle invariant: replacing only the control plane must not
          # replace the runtime or its live local session process.
          runtime_container_before="$(docker compose ps -q node-runtime)"
          runtime_start_before="$(docker compose exec -T node-runtime awk '{print $22}' /proc/1/stat)"
          session_pid_before=''
          for _attempt in $(seq 1 30); do
            session_pid_before="$(curl --fail --silent --show-error --insecure -b release-cookies.txt \
              "$origin/api/nodes/$node_id/info" | jq -r --arg id "$session_id" '.processes[$id].pid // empty')"
            [ -n "$session_pid_before" ] && break
            sleep 1
          done
          test -n "$session_pid_before"
          docker compose up -d --no-build --no-deps --force-recreate orchestrator
          for _attempt in $(seq 1 60); do
            if docker compose exec -T orchestrator node -e \
              "fetch('http://127.0.0.1:8080/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"; then
              break
            fi
            sleep 1
          done
          test "$(docker compose ps -q node-runtime)" = "$runtime_container_before"
          test "$(docker compose exec -T node-runtime awk '{print $22}' /proc/1/stat)" = "$runtime_start_before"
          session_pid_after="$(curl --fail --silent --show-error --insecure -b release-cookies.txt \
            "$origin/api/nodes/$node_id/info" | jq -r --arg id "$session_id" '.processes[$id].pid // empty')"
          test "$session_pid_after" = "$session_pid_before"
          printf 'runtime=%s session=%s pid=%s survived orchestrator recreation\n' \
            "$runtime_container_before" "$session_id" "$session_pid_before" | tee -a release-smoke.log

          curl --fail --silent --show-error --insecure "${auth[@]}" -X DELETE \
            "$origin/api/sessions/$session_id" >/dev/null

      - name: Collect candidate diagnostics
        if: always()
        run: docker compose logs --no-color > release-containers.log 2>&1 || true

      - name: Upload smoke evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-smoke
          path: |
            release-smoke.log
            release-containers.log
            release-diagnostics.json
            release-edge-headers.txt
            agent-versions.txt
          if-no-files-found: warn
          retention-days: 90

      - name: Stop candidate stack
        if: always()
        run: docker compose down --volumes --remove-orphans

  promote:
    name: Promote verified manifests
    needs: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download candidate digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digest-*
          path: release-candidates
          merge-multiple: true

      - name: Download tested agent versions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-smoke
          path: release-smoke

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote exact digests and verify both architectures
        env:
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC2153 # VERSION is supplied by the step env above.
          version="${VERSION#v}"
          major_minor="$(printf '%s' "$version" | cut -d. -f1,2)"
          for image in shepherd-orchestrator shepherd-node-runtime shepherd-web; do
            digest="$(cat "release-candidates/digests/$image.digest")"
            source="$REGISTRY/$image@$digest"
            tags="--tag $REGISTRY/$image:$version"
            annotations=''
            if [ "$image" = shepherd-node-runtime ]; then
              codex_version="$(sed -n '1s/.* //p' release-smoke/agent-versions.txt)"
              opencode_version="$(sed -n '2s/.* //p' release-smoke/agent-versions.txt)"
              annotations="--annotation index:io.flock.agent.codex-version=$codex_version --annotation index:io.flock.agent.opencode-version=$opencode_version"
            fi
            if ! printf '%s' "$version" | grep -q -- '-'; then
              tags="$tags --tag $REGISTRY/$image:$major_minor --tag $REGISTRY/$image:latest"
            fi
            # shellcheck disable=SC2086
            docker buildx imagetools create $tags $annotations "$source"
            manifest="$(docker buildx imagetools inspect "$REGISTRY/$image:$version")"
            printf '%s\n' "$manifest" | grep -q 'linux/amd64'
            printf '%s\n' "$manifest" | grep -q 'linux/arm64'
          done

      - name: Verify anonymous release access
        env:
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          docker logout ghcr.io
          # shellcheck disable=SC2153 # VERSION is supplied by the step env above.
          version="${VERSION#v}"
          for image in shepherd-orchestrator shepherd-node-runtime shepherd-web; do
            if ! manifest="$(docker buildx imagetools inspect "$REGISTRY/$image:$version")"; then
              printf '::error::%s must be public before this release can be published. Set Package settings → Change visibility → Public, then rerun failed jobs.\n' "$REGISTRY/$image"
              exit 1
            fi
            printf '%s\n' "$manifest" | grep -q 'linux/amd64'
            printf '%s\n' "$manifest" | grep -q 'linux/arm64'
          done

      - name: Build exact deployment bundle
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          scripts/build-deployment-bundle.sh "$VERSION" release-candidates/digests dist/deployment
          (cd dist/deployment && sha256sum -c shepherd-deployment-*.tar.gz.sha256)

      - name: Attest deployment bundle
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: dist/deployment/shepherd-deployment-*.tar.gz

      - name: Upload deployment bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deployment-bundle
          path: dist/deployment/
          retention-days: 90

  release:
    name: Publish GitHub release last
    needs: promote
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Download tested agent versions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-smoke
          path: release-smoke

      - name: Download deployment bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: deployment-bundle
          path: deployment-bundle

      - name: Create release only after image verification
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          module_tag="agentd/$TAG"
          if git ls-remote --exit-code --tags origin "refs/tags/$module_tag" >/dev/null 2>&1; then
            git fetch --tags origin "refs/tags/$module_tag:refs/tags/$module_tag"
            test "$(git rev-list -n 1 "$module_tag")" = "$GITHUB_SHA"
          else
            git tag "$module_tag" "$GITHUB_SHA"
            git push origin "refs/tags/$module_tag"
          fi
          prerelease=''
          if printf '%s' "$TAG" | grep -q -- '-'; then prerelease='--prerelease'; fi
          # shellcheck disable=SC2086
          release_version="${TAG#v}"
          {
            printf 'Shepherd %s: guide coding agents across local and remote nodes from one responsive Paddock.\n\n' "$release_version"
            awk -v version="$release_version" '
              index($0, "## [" version "]") == 1 { found = 1; next }
              found && /^## \[/ { exit }
              found { print }
              END { if (!found) exit 1 }
            ' CHANGELOG.md
            printf '\n## Quick start\n\nFollow the [Docker Compose quick start](%s/%s#quick-start). A fresh installation has no default credentials; the first person completing setup creates the administrator account.\n\n' "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY"
            printf '## Tested coding-agent versions\n\n```text\n'
            cat release-smoke/agent-versions.txt
            printf '```\n\nClaude Code is installed from the latest channel at first start and its exact running version is shown in Settings → Operations.\n\n'
            printf '## Node daemon compatibility\n\n```json\n'
            cat agentd/COMPATIBILITY.json
            printf '```\n\nNodes report whether this policy makes their daemon compatible, recommended to upgrade, or required to upgrade.\n'
          } > release-tool-versions.md
          # shellcheck disable=SC2086
          gh release create "$TAG" --verify-tag --notes-file release-tool-versions.md --title "Shepherd ${TAG#v}" $prerelease
          cp agentd/COMPATIBILITY.json agentd-compatibility.json
          gh release upload "$TAG" \
            release-smoke/release-diagnostics.json release-smoke/agent-versions.txt \
            agentd-compatibility.json deployment-bundle/shepherd-deployment-*.tar.gz \
            deployment-bundle/shepherd-deployment-*.tar.gz.sha256
