name: Release images

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Require a tagged commit from main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 9.12.3

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25'
          cache-dependency-path: agentd/go.sum

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Match tag to repository version
        env:
          EXPECTED_VERSION: ${{ github.ref_name }}
        run: node scripts/check-release-version.mjs

      - name: Verify TypeScript release
        run: |
          pnpm format:check
          pnpm -r build
          pnpm -r typecheck
          pnpm lint
          pnpm quality
          pnpm test:coverage
          pnpm audit --prod --audit-level high

      - name: Verify Chromium and mobile WebKit behavior
        run: |
          pnpm exec playwright install --with-deps chromium webkit
          pnpm test:e2e

      - name: Verify Go release
        working-directory: agentd
        run: |
          go vet ./...
          go install honnef.co/go/tools/cmd/staticcheck@v0.6.1
          staticcheck ./...
          go test -race ./...
          go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
          make dist

      - name: Run PostgreSQL and SSH integration suite
        run: |
          docker compose -f docker-compose.dev.yml build builder sshd
          docker compose -f docker-compose.dev.yml up -d --wait postgres sshd
          docker compose -f docker-compose.dev.yml run --rm builder sh -lc \
            'until [ -s /ssh-keys/id_test ]; do sleep 1; done; pnpm install --frozen-lockfile; pnpm --filter @flock/shared build; pnpm test:int'

      - name: Collect integration logs
        if: always()
        run: docker compose -f docker-compose.dev.yml logs --no-color > release-integration.log 2>&1 || true

      - name: Stop integration services
        if: always()
        run: docker compose -f docker-compose.dev.yml down --volumes --remove-orphans

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-validation
          path: |
            coverage/
            release-integration.log
          if-no-files-found: warn
          retention-days: 30

  candidate:
    name: Build candidate ${{ matrix.image }}
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: flock-orchestrator
            dockerfile: docker/Dockerfile.orchestrator
          - image: flock-web
            dockerfile: docker/Dockerfile.web
          - image: flock-session-chrome
            dockerfile: docker/Dockerfile.session-chrome
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
      CANDIDATE_TAG: candidate-${{ github.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push immutable candidate
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}:${{ env.CANDIDATE_TAG }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: mode=max
          sbom: true

      - name: Record candidate digest
        run: |
          mkdir -p digests
          printf '%s\n' '${{ steps.push.outputs.digest }}' > 'digests/${{ matrix.image }}.digest'

      - name: Upload digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: digest-${{ matrix.image }}
          path: digests/
          retention-days: 30

      - name: Attest build provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  smoke:
    name: Smoke exact candidate images
    needs: candidate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: read
    env:
      CANDIDATE_TAG: candidate-${{ github.sha }}
      FLOCK_IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
      HTTP_HOST_PORT: '18080'
      HTTPS_HOST_PORT: '18443'
      FLOCK_DOMAIN: localhost
      PUBLIC_BASE_URL: https://localhost:18443
      FLOCK_ALLOWED_ORIGINS: https://localhost:18443
      FLOCK_INSTALL_CLAUDE_CODE: '0'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare isolated release secrets
        run: |
          mkdir -p secrets
          openssl rand -base64 32 > secrets/flock_master_key
          openssl rand -base64 32 > secrets/postgres_password
          openssl rand -base64 48 > secrets/browser_worker_token

      - name: Pull exact candidates
        run: |
          for image in flock-orchestrator flock-web flock-session-chrome; do
            docker pull "$FLOCK_IMAGE_REGISTRY/$image:$CANDIDATE_TAG"
          done

      - name: Start clean candidate stack
        env:
          FLOCK_VERSION: ${{ env.CANDIDATE_TAG }}
          BROWSER_IMAGE: ${{ env.FLOCK_IMAGE_REGISTRY }}/flock-session-chrome:${{ env.CANDIDATE_TAG }}
        run: docker compose up -d --no-build --wait postgres browser-worker orchestrator web caddy

      - name: Verify migrations, readiness, setup, login, and API
        run: |
          set -eu
          curl --fail --silent --show-error --insecure https://localhost:18443/health | tee release-smoke.log
          docker compose exec -T orchestrator node -e \
            "fetch('http://127.0.0.1:8080/ready').then(async r => { console.log(await r.text()); process.exit(r.ok ? 0 : 1) })" \
            | tee -a release-smoke.log
          curl --fail --silent --show-error --insecure \
            -H 'content-type: application/json' \
            -d '{"username":"release-owner","password":"Release-Smoke-Only-2026!"}' \
            https://localhost:18443/api/auth/setup | tee -a release-smoke.log
          curl --fail --silent --show-error --insecure -c release-cookies.txt \
            -H 'content-type: application/json' \
            -d '{"username":"release-owner","password":"Release-Smoke-Only-2026!"}' \
            https://localhost:18443/api/auth/login | tee -a release-smoke.log
          curl --fail --silent --show-error --insecure -b release-cookies.txt \
            https://localhost:18443/api/auth/me | tee -a release-smoke.log
          curl --fail --silent --show-error --insecure https://localhost:18443/ \
            | grep -q '<div id="root">'
          docker compose exec -T orchestrator flock-agentd version | tee -a release-smoke.log
          {
            docker compose exec -T orchestrator codex --version
            docker compose exec -T orchestrator opencode --version
            docker compose exec -T orchestrator sh -lc 'claude --version 2>/dev/null || echo "claude: runtime installer disabled in candidate smoke"'
          } | tee agent-versions.txt | tee -a release-smoke.log
          curl --fail --silent --show-error --insecure -b release-cookies.txt \
            https://localhost:18443/api/diagnostics | tee release-diagnostics.json

      - name: Verify constrained browser worker policy and lifecycle
        run: |
          set -eu
          test "$(docker compose exec -T browser-worker sh -lc \
            "curl -s -o /dev/null -w '%{http_code}' -X POST http://127.0.0.1:8090/containers/create")" = 401
          docker compose exec -T browser-worker sh -lc '
            token="$(cat /run/secrets/browser_worker_token)"
            id=11111111-1111-4111-8111-111111111111
            test "$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $token" \
              -H "Content-Type: application/json" -d "{\"sessionId\":\"$id\",\"privileged\":true}" \
              http://127.0.0.1:8090/v1/browsers)" = 400
            curl --fail --silent -H "Authorization: Bearer $token" -H "Content-Type: application/json" \
              -d "{\"sessionId\":\"$id\"}" http://127.0.0.1:8090/v1/browsers
            curl --fail --silent -X DELETE -H "Authorization: Bearer $token" \
              "http://127.0.0.1:8090/v1/browsers/$id"
          ' | tee -a release-smoke.log

      - name: Collect candidate diagnostics
        if: always()
        run: docker compose logs --no-color > release-containers.log 2>&1 || true

      - name: Upload smoke evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-smoke
          path: |
            release-smoke.log
            release-containers.log
            release-diagnostics.json
            agent-versions.txt
          if-no-files-found: warn
          retention-days: 90

      - name: Stop candidate stack
        if: always()
        run: docker compose down --volumes --remove-orphans

  promote:
    name: Promote verified manifests
    needs: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download candidate digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: digest-*
          path: digests
          merge-multiple: true

      - name: Download tested agent versions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-smoke
          path: release-smoke

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote exact digests and verify both architectures
        env:
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -eu
          # shellcheck disable=SC2153 # VERSION is supplied by the step env above.
          version="${VERSION#v}"
          major_minor="$(printf '%s' "$version" | cut -d. -f1,2)"
          for image in flock-orchestrator flock-web flock-session-chrome; do
            digest="$(cat "digests/$image.digest")"
            source="$REGISTRY/$image@$digest"
            tags="--tag $REGISTRY/$image:$version"
            annotations=''
            if [ "$image" = flock-orchestrator ]; then
              codex_version="$(sed -n '1s/.* //p' release-smoke/agent-versions.txt)"
              opencode_version="$(sed -n '2s/.* //p' release-smoke/agent-versions.txt)"
              annotations="--annotation index:io.flock.agent.codex-version=$codex_version --annotation index:io.flock.agent.opencode-version=$opencode_version"
            fi
            if ! printf '%s' "$version" | grep -q -- '-'; then
              tags="$tags --tag $REGISTRY/$image:$major_minor --tag $REGISTRY/$image:latest"
            fi
            # shellcheck disable=SC2086
            docker buildx imagetools create $tags $annotations "$source"
            manifest="$(docker buildx imagetools inspect "$REGISTRY/$image:$version")"
            printf '%s\n' "$manifest" | grep -q 'linux/amd64'
            printf '%s\n' "$manifest" | grep -q 'linux/arm64'
          done

      - name: Verify anonymous release access
        env:
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -eu
          docker logout ghcr.io
          # shellcheck disable=SC2153 # VERSION is supplied by the step env above.
          version="${VERSION#v}"
          for image in flock-orchestrator flock-web flock-session-chrome; do
            if ! manifest="$(docker buildx imagetools inspect "$REGISTRY/$image:$version")"; then
              printf '::error::%s must be public before this release can be published. Set Package settings → Change visibility → Public, then rerun failed jobs.\n' "$REGISTRY/$image"
              exit 1
            fi
            printf '%s\n' "$manifest" | grep -q 'linux/amd64'
            printf '%s\n' "$manifest" | grep -q 'linux/arm64'
          done

  release:
    name: Publish GitHub release last
    needs: promote
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Download tested agent versions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-smoke
          path: release-smoke

      - name: Create release only after image verification
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          module_tag="agentd/$TAG"
          if git ls-remote --exit-code --tags origin "refs/tags/$module_tag" >/dev/null 2>&1; then
            git fetch --tags origin "refs/tags/$module_tag:refs/tags/$module_tag"
            test "$(git rev-list -n 1 "$module_tag")" = "$GITHUB_SHA"
          else
            git tag "$module_tag" "$GITHUB_SHA"
            git push origin "refs/tags/$module_tag"
          fi
          prerelease=''
          if printf '%s' "$TAG" | grep -q -- '-'; then prerelease='--prerelease'; fi
          # shellcheck disable=SC2086
          release_version="${TAG#v}"
          {
            printf 'The first public Shepherd release: run and supervise coding agents across local and remote nodes from one responsive Paddock.\n\n'
            awk -v version="$release_version" '
              index($0, "## [" version "]") == 1 { found = 1; next }
              found && /^## \[/ { exit }
              found { print }
              END { if (!found) exit 1 }
            ' CHANGELOG.md
            printf '\n## Quick start\n\nFollow the [Docker Compose quick start](%s/%s#quick-start). A fresh installation has no default credentials; the first person completing setup creates the administrator account.\n\n' "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY"
            printf '## Tested coding-agent versions\n\n```text\n'
            cat release-smoke/agent-versions.txt
            printf '```\n\nClaude Code is installed from the latest channel at first start and its exact running version is shown in Settings → Operations.\n\n'
            printf '## Node daemon compatibility\n\n```json\n'
            cat agentd/COMPATIBILITY.json
            printf '```\n\nNodes report whether this policy makes their daemon compatible, recommended to upgrade, or required to upgrade.\n'
          } > release-tool-versions.md
          # shellcheck disable=SC2086
          gh release create "$TAG" --verify-tag --notes-file release-tool-versions.md --title "Shepherd ${TAG#v}" $prerelease
          cp agentd/COMPATIBILITY.json agentd-compatibility.json
          gh release upload "$TAG" release-smoke/release-diagnostics.json release-smoke/agent-versions.txt agentd-compatibility.json
