version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      npm-minor-patch:
        update-types: [minor, patch]
    open-pull-requests-limit: 10

  - package-ecosystem: gomod
    directory: /agentd
    schedule:
      interval: weekly
      day: monday
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ['*']

  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
      day: monday
    groups:
      container-bases:
        patterns: ['*']

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      compose-images:
        patterns: ['*']
