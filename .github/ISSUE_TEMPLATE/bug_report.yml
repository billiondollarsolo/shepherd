name: Bug report
description: Report reproducible incorrect behavior in Shepherd
title: '[Bug]: '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: For security issues, use private vulnerability reporting instead.
  - type: input
    id: version
    attributes:
      label: Shepherd version
      placeholder: 0.3.1
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Docker Compose
        - Native development
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Include the expected behavior and exact reproduction steps.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove tokens, credentials, private hostnames, and private source code.
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, architecture, node type, and agent CLI/version.
