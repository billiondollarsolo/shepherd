# =============================================================================
# Shepherd — LOCAL bring-up (quick same-origin look on a single high port).
#
#   docker compose --env-file .env.flock-local -f docker-compose.local.yml up -d
#   open http://localhost:48080
#
# Reuses the already-built dev image (flock-dev:latest) instead of building the
# production application images. Upstream nginx serves the existing web bundle
# and upstream Traefik proxies API/WS on :48080 over plain loopback HTTP.
# =============================================================================
name: flock-local

services:
  postgres:
    image: postgres:16-bookworm@sha256:92620daddcd947f8d5ab5ba66e848702fe443d87fed30c4cea8e389fd78dfc55
    environment:
      POSTGRES_USER: flock
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flock}
      POSTGRES_DB: flock
    volumes:
      - flock-local-pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U flock -d flock']
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - flock-local

  orchestrator:
    image: flock-dev:latest
    working_dir: /workspace
    # Apply migrations (tsx) then run the orchestrator (tsx). Uses the workspace
    # node_modules already installed in the dev image.
    command:
      - sh
      - -lc
      - 'pnpm --filter @flock/orchestrator db:migrate && pnpm --filter @flock/orchestrator dev'
    environment:
      DATABASE_URL: postgres://flock:${POSTGRES_PASSWORD:-flock}@postgres:5432/flock
      HOST: 0.0.0.0
      PORT: '8080'
      # Plain HTTP local development explicitly uses a non-Secure host-only cookie.
      FLOCK_ALLOW_INSECURE_HTTP: '1'
      PUBLIC_BASE_URL: http://localhost:48080
      FLOCK_ALLOWED_ORIGINS: http://localhost:48080
      FLOCK_PREVIEW_DOMAIN: preview.localhost
      FLOCK_PREVIEW_HOST: 0.0.0.0
      FLOCK_PREVIEW_PORT: '8081'
      FLOCK_PREVIEW_PUBLIC_PORT: '48081'
      FLOCK_MASTER_KEY: ${FLOCK_MASTER_KEY}
      FLOCK_MASTER_KEY_VERSION: '1'
      FLOCK_AGENTD_SOCKET: /run/flock-agentd/flock-agentd.sock
      FLOCK_AGENTD_SECRET_FILE: /run/flock-agentd/control.key
      FLOCK_AGENTD_NODE_ID_FILE: /run/flock-agentd/node-id
      FLOCK_LOCAL_HOOK_BASE_URL: http://orchestrator:8080
    volumes:
      - .:/workspace
      - flock-local-control:/run/flock-agentd:ro
    depends_on:
      postgres:
        condition: service_healthy
      node-runtime:
        condition: service_healthy
    networks:
      - flock-local
      - runtime

  node-runtime:
    build:
      context: .
      dockerfile: docker/Dockerfile.node-runtime
    image: shepherd-node-runtime:dev
    restart: unless-stopped
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE, FOWNER, KILL, SETGID, SETUID]
    environment:
      FLOCK_AGENTD_SOCKET: /run/flock-agentd/flock-agentd.sock
      FLOCK_AGENTD_SECRET_FILE: /run/flock-agentd/control.key
      FLOCK_AGENTD_NODE_ID_FILE: /run/flock-agentd/node-id
      FLOCK_AGENTD_STATE_DIR: /var/lib/flock-agentd
      FLOCK_RUNTIME_HOME: /home/flock-agent
      FLOCK_RUNTIME_USER: flock-agent
      FLOCK_RUNTIME_UID: '701'
      FLOCK_RUNTIME_GID: '701'
      FLOCK_AGENTD_CLAUDE_POLICY: ${FLOCK_AGENTD_CLAUDE_POLICY:-best-effort-latest}
    volumes:
      - flock-local-home:/home/flock-agent
      - flock-local-state:/var/lib/flock-agentd
      - flock-local-control:/run/flock-agentd
    tmpfs: [/tmp:rw, noexec, nosuid, nodev, size=256m, /run:rw, nosuid, nodev, size=16m]
    healthcheck:
      test:
        [
          CMD,
          flock-agentd,
          probe,
          --socket,
          /run/flock-agentd/flock-agentd.sock,
          --secret-file,
          /run/flock-agentd/control.key,
          --node-id-file,
          /run/flock-agentd/node-id,
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [runtime]

  web:
    image: nginx:1.28-alpine@sha256:a8b39bd9cf0f83869a2162827a0caf6137ddf759d50a171451b335cecc87d236
    restart: unless-stopped
    read_only: true
    security_opt: [no-new-privileges:true]
    volumes:
      - ./apps/web/dist:/usr/share/html:ro
      - ./docker/nginx-spa.conf:/etc/nginx/http.d/default.conf:ro
    tmpfs:
      - /var/lib/nginx/tmp:size=32m,uid=101,gid=101,mode=0750
      - /var/run:size=4m,uid=101,gid=101,mode=0750
      - /var/log/nginx:size=8m,uid=101,gid=101,mode=0750
    networks: [flock-local]

  traefik:
    image: traefik:v3.7@sha256:4299bbed850421258fc5448c2e0e6ad350981d4d335a68de11b92448aedbefe5
    restart: unless-stopped
    read_only: true
    security_opt: [no-new-privileges:true]
    command:
      - --global.checknewversion=false
      - --global.sendanonymoususage=false
      - --api.dashboard=false
      - --entrypoints.web.address=:80
      - --entrypoints.preview.address=:81
      - --entrypoints.ping.address=:8082
      - --ping=true
      - --ping.entrypoint=ping
      - --providers.file.filename=/etc/traefik/dynamic/routes.yml
      - --providers.file.watch=true
    ports:
      - '48080:80'
      - '48081:81'
    volumes:
      - ./docker/traefik/dynamic-local.yml:/etc/traefik/dynamic/routes.yml:ro
    depends_on:
      - orchestrator
      - web
    networks:
      - flock-local

networks:
  flock-local:
    driver: bridge
  runtime:
    driver: bridge

volumes:
  flock-local-pg:
  flock-local-home:
  flock-local-state:
  flock-local-control:
