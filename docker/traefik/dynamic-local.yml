# Plain loopback development edge. COOP is valid on localhost, unlike arbitrary
# LAN/IP HTTP origins. Preview remains on its dedicated high port.
http:
  routers:
    shepherd-local-api:
      rule: 'PathPrefix(`/api`) || PathPrefix(`/ws`) || PathPrefix(`/health`)'
      entryPoints: [web]
      service: shepherd-orchestrator
      middlewares: [shepherd-local-security]
      priority: 100
    shepherd-local-web:
      rule: 'PathPrefix(`/`)'
      entryPoints: [web]
      service: shepherd-web
      middlewares: [shepherd-local-security]
      priority: 1
    shepherd-local-preview:
      rule: 'HostRegexp(`[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?[.]preview[.]localhost`)'
      entryPoints: [preview]
      service: shepherd-preview
      middlewares: [shepherd-preview-security]

  services:
    shepherd-orchestrator:
      loadBalancer:
        servers:
          - url: http://orchestrator:8080
    shepherd-web:
      loadBalancer:
        servers:
          - url: http://web:80
    shepherd-preview:
      loadBalancer:
        servers:
          - url: http://orchestrator:8081

  middlewares:
    shepherd-local-security:
      headers:
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: strict-origin-when-cross-origin
        permissionsPolicy: 'accelerometer=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), serial=(), usb=(), xr-spatial-tracking=(), clipboard-read=(self), clipboard-write=(self), fullscreen=(self)'
        contentSecurityPolicy: "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' data: ws://localhost:48080; worker-src 'self'; manifest-src 'self'; media-src 'none'; frame-src http://*.preview.localhost:48081"
        customResponseHeaders:
          Cross-Origin-Opener-Policy: same-origin
          Cross-Origin-Resource-Policy: same-origin
          X-Permitted-Cross-Domain-Policies: none
          Server: ''
    shepherd-preview-security:
      headers:
        contentTypeNosniff: true
        referrerPolicy: no-referrer
        customResponseHeaders:
          Cross-Origin-Opener-Policy: same-origin
          Server: ''
