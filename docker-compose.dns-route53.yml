# Optional Amazon Route53 DNS-01 certificate issuance.
#
# Prefer an instance/task role where the runtime supports one; in that case a
# small operator override can enable this resolver without mounting credentials.
# lego's AWS SDK does not support _FILE on the individual access-key variables,
# so the checked-in static-key profile mounts the standard AWS credentials file.
services:
  traefik:
    environment:
      FLOCK_PREVIEW_EDGE_ENABLED: '1'
      FLOCK_TLS_CERT_RESOLVER: dns
      AWS_SHARED_CREDENTIALS_FILE: /run/secrets/route53_credentials
      AWS_REGION: ${AWS_REGION:-us-east-1}
      TRAEFIK_CERTIFICATESRESOLVERS_DNS_ACME_EMAIL: ${ACME_EMAIL:?Set ACME_EMAIL for certificate expiry notices}
      TRAEFIK_CERTIFICATESRESOLVERS_DNS_ACME_STORAGE: /letsencrypt/dns-acme.json
      TRAEFIK_CERTIFICATESRESOLVERS_DNS_ACME_DNSCHALLENGE: 'true'
      TRAEFIK_CERTIFICATESRESOLVERS_DNS_ACME_DNSCHALLENGE_PROVIDER: route53
      TRAEFIK_CERTIFICATESRESOLVERS_DNS_ACME_DNSCHALLENGE_RESOLVERS: ${FLOCK_DNS_RESOLVERS:-1.1.1.1:53,1.0.0.1:53}
    secrets:
      - route53_credentials

  orchestrator:
    environment:
      FLOCK_PREVIEW_BACKEND: hostname

secrets:
  route53_credentials:
    file: ${ROUTE53_SHARED_CREDENTIALS_FILE:-./secrets/route53_credentials}
