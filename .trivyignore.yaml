# Release-image risk register. Entries cover either a stable-distribution package
# with no available fix or a narrowly path-scoped, reviewed upstream helper whose
# affected standard-library path is unreachable in Shepherd's use. The release
# workflow retains the unsuppressed inventory, rejects every new High/Critical
# finding, and forces this list to be reviewed by the expiry. Remove an entry as
# soon as a rebuilt image no longer reports it.
vulnerabilities:
  # The official PostgreSQL image's gosu 1.19 helper was compiled with Go
  # 1.24.6. Trivy consequently flags standard-library CVEs by build version,
  # even though gosu is a local setuid/setgid entrypoint helper that receives
  # only Shepherd's fixed postgres UID/GID arguments and exposes no network or
  # untrusted parsing surface. Keep every exception scoped to the exact binary
  # path, retain the unsuppressed report as release evidence, and require a
  # near-term review so the exceptions disappear after upstream rebuilds gosu.
  - id: CVE-2025-61726
    paths: [usr/local/bin/gosu]
    expired_at: 2026-08-15
    statement: Not reachable in the fixed-argument upstream gosu entrypoint helper; awaiting an upstream rebuild.
  - id: CVE-2025-61729
    paths: [usr/local/bin/gosu]
    expired_at: 2026-08-15
    statement: Not reachable in the fixed-argument upstream gosu entrypoint helper; awaiting an upstream rebuild.
  - id: CVE-2025-68121
