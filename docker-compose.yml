# =============================================================================
# Shepherd — PRODUCTION Docker Compose deploy (US-38/US-39, NFR-DEP1/DEP2/SEC1)
#
#   docker compose pull         # pull the selected Shepherd release from GHCR
#   docker compose up -d        # traefik(TLS) + orchestrator + postgres + web
#
# US-39: Traefik terminates TLS in front (NFR-SEC1) and is the ONLY service that
# publishes host ports (80/443). The orchestrator and web speak plain HTTP/WS on
# the internal network and are never exposed directly. ALL UI/API/WS require
# auth, enforced by the orchestrator's default-deny surface guard (NFR-SEC6);
# the per-session-token hook endpoint is the one exception (spec §8.1).
#
# Secrets are supplied at runtime via env / Docker secret files — never baked
# into images (NFR-DEP2). Copy `.env.example` -> `.env` and fill it in, and (in
# production) populate the secret files under `./secrets/`.
#
# Dev/local iteration uses docker-compose.dev.yml instead.
# =============================================================================

name: flock

services:
  # ---------------------------------------------------------------------------
  # Traefik — upstream reverse proxy + TLS termination (US-39, NFR-SEC1). The
  # ONLY service published to the public interface. Static file discovery keeps
  # the Docker socket completely outside the edge trust boundary.
  # It terminates HTTPS and proxies /api + /ws + /health to the orchestrator and
  # everything else to the web bundle. Auth is
  # enforced inside the orchestrator (default-deny surface guard, NFR-SEC6); the
  # hook endpoint stays the per-session-token exception (spec §8.1).
  #
  # A real FLOCK_DOMAIN is required here. Traefik obtains the control-plane
  # certificate through HTTP-01 by default; DNS overlays select Cloudflare or
  # Route53 and add the wildcard Preview certificate. ACME state persists in
  # traefik_acme and is never baked into an image (NFR-DEP2).
  # ---------------------------------------------------------------------------
  traefik:
    image: ${TRAEFIK_IMAGE:-traefik:v3.7@sha256:4299bbed850421258fc5448c2e0e6ad350981d4d335a68de11b92448aedbefe5}
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    pids_limit: 128
    depends_on:
      - orchestrator
      - web
    environment:
      FLOCK_DOMAIN: ${FLOCK_DOMAIN:?Set the public Shepherd hostname}
      # Hostname Preview is enabled only when this is a real dedicated suffix.
      # The DNS overlays switch the orchestrator to hostname mode and configure
      # DNS-01 for the required wildcard certificate.
      FLOCK_PREVIEW_DOMAIN: ${FLOCK_PREVIEW_DOMAIN:-preview.invalid}
      FLOCK_PREVIEW_EDGE_ENABLED: ${FLOCK_PREVIEW_EDGE_ENABLED:-0}
      FLOCK_PREVIEW_FRAME_SOURCES: ${FLOCK_PREVIEW_FRAME_SOURCES:-}
      FLOCK_HTTPS_REDIRECT_PORT: ${HTTPS_HOST_PORT:-443}
      # An explicitly empty value is reserved for offline/CI TLS smoke tests,
      # where Traefik's generated certificate exercises routing without ACME.
      FLOCK_TLS_CERT_RESOLVER: ${FLOCK_TLS_CERT_RESOLVER-http}
      TRAEFIK_GLOBAL_CHECKNEWVERSION: 'false'
      TRAEFIK_GLOBAL_SENDANONYMOUSUSAGE: 'false'
      TRAEFIK_API_DASHBOARD: 'false'
      TRAEFIK_ACCESSLOG: 'true'
      TRAEFIK_ACCESSLOG_FIELDS_HEADERS_DEFAULTMODE: drop
      TRAEFIK_LOG_LEVEL: ${TRAEFIK_LOG_LEVEL:-INFO}
      TRAEFIK_ENTRYPOINTS_WEB_ADDRESS: ':80'
      TRAEFIK_ENTRYPOINTS_WEBSECURE_ADDRESS: ':443'
      TRAEFIK_ENTRYPOINTS_PING_ADDRESS: ':8082'
      TRAEFIK_PING: 'true'
      TRAEFIK_PING_ENTRYPOINT: ping
      TRAEFIK_PROVIDERS_FILE_FILENAME: /etc/traefik/dynamic/routes.yml
      TRAEFIK_PROVIDERS_FILE_WATCH: 'true'
      TRAEFIK_CERTIFICATESRESOLVERS_HTTP_ACME_EMAIL: ${ACME_EMAIL:-admin@example.invalid}
      TRAEFIK_CERTIFICATESRESOLVERS_HTTP_ACME_STORAGE: /letsencrypt/http-acme.json
      TRAEFIK_CERTIFICATESRESOLVERS_HTTP_ACME_HTTPCHALLENGE: 'true'
      TRAEFIK_CERTIFICATESRESOLVERS_HTTP_ACME_HTTPCHALLENGE_ENTRYPOINT: web
    ports:
      - '${HTTP_HOST_PORT:-80}:80'
      - '${HTTPS_HOST_PORT:-443}:443'
    volumes:
      - ./docker/traefik/dynamic-tls.yml:/etc/traefik/dynamic/routes.yml:ro
      - traefik_acme:/letsencrypt
    tmpfs:
      - /tmp:size=16m,mode=1777
    networks:
      - edge
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', '-T', '2', 'http://127.0.0.1:8082/ping']
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Postgres — durable system of record. NOT on the live status path (PRD §6.6).
  # ---------------------------------------------------------------------------
  postgres:
    # Latest upstream security/patch release within the supported PostgreSQL 16
    # major. Digest pinning makes upgrades reviewable and prevents an accidental
    # major-version/data-layout migration from a floating `latest` tag.
    image: ${POSTGRES_IMAGE:-postgres:16-bookworm@sha256:92620daddcd947f8d5ab5ba66e848702fe443d87fed30c4cea8e389fd78dfc55}
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flock}
      POSTGRES_DB: ${POSTGRES_DB:-flock}
      # The official image rejects setting both POSTGRES_PASSWORD and
      # POSTGRES_PASSWORD_FILE. Production uses the mounted secret exclusively.
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /var/run/postgresql:size=16m,uid=999,gid=999,mode=3775
    networks:
      - data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-flock} -d ${POSTGRES_DB:-flock}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Bundled local node runtime — owns flock-agentd, agent CLIs, PTYs, workspaces,
  # and node-local development servers. It is deliberately versioned and
  # restarted independently from the control plane so active local sessions
  # survive orchestrator/web/Traefik upgrades.
  # ---------------------------------------------------------------------------
  node-runtime:
    build:
      context: .
      dockerfile: docker/Dockerfile.node-runtime
      args:
        IMAGE_VERSION: ${FLOCK_NODE_RUNTIME_VERSION:-0.6.1}
        VCS_REF: ${FLOCK_VCS_REF:-unknown}
    image: ${FLOCK_IMAGE_REGISTRY:-ghcr.io/billiondollarsolo}/shepherd-node-runtime:${FLOCK_NODE_RUNTIME_VERSION:-0.6.1}
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      # agentd hardens and atomically replaces runtime-user-owned config/temp
      # paths; FOWNER is required to enforce their modes after ownership exists.
      - FOWNER
      - KILL
      - SETGID
      - SETUID
    pids_limit: 2048
    stop_grace_period: 15s
    environment:
      FLOCK_AGENTD_SOCKET: /run/flock-agentd/control.sock
      FLOCK_AGENTD_SECRET_FILE: /run/flock-agentd/control.key
      FLOCK_AGENTD_NODE_ID_FILE: /run/flock-agentd/node-id
      FLOCK_INSTALL_CLAUDE_CODE: ${FLOCK_INSTALL_CLAUDE_CODE:-1}
    volumes:
      - 'flock_agent_home:/home/flock-agent'
      - 'flock_agentd_state:/var/lib/flock-agentd'
      - 'flock_agentd_control:/run/flock-agentd'
    tmpfs:
      - /tmp:size=512m,mode=1777,noexec,nosuid,nodev
    networks:
      - runtime
    healthcheck:
      test:
        - CMD
        - flock-agentd
        - probe
        - --socket
        - /run/flock-agentd/control.sock
        - --secret-file
        - /run/flock-agentd/control.key
        - --node-id-file
        - /run/flock-agentd/node-id
        - --timeout
        - 2s
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Orchestrator — the brain. Status model, hooks, SSH, preview gateway, auth.
  # This service has no Docker socket. TLS is terminated by an upstream proxy
  # (US-39 / NFR-SEC1) — this service speaks plain HTTP/WS internally.
  # ---------------------------------------------------------------------------
  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
    image: ${FLOCK_IMAGE_REGISTRY:-ghcr.io/billiondollarsolo}/shepherd-orchestrator:${FLOCK_VERSION:-0.6.1}
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    pids_limit: 2048
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      node-runtime:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${PORT:-8080}
      # Bind all interfaces INSIDE the container so Traefik/web can reach it as
      # orchestrator:8080 (the app default is loopback-only). The published port is
      # still gated by the compose `ports:`/reverse proxy, not this bind.
      HOST: ${HOST:-0.0.0.0}
      # The base stack is the secure default: bundled Traefik terminates TLS.
      # Alternate topologies use the checked-in Compose overrides rather than
      # weakening this file in place.
      FLOCK_DEPLOYMENT_MODE: builtin-tls
      # Optional explicit override. When empty, the entrypoint safely constructs
      # DATABASE_URL from these fields + the mounted password secret.
      DATABASE_URL: ${DATABASE_URL:-}
      POSTGRES_USER: ${POSTGRES_USER:-flock}
      POSTGRES_DB: ${POSTGRES_DB:-flock}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      # Public URL users open in the browser (Traefik HTTPS), NOT the internal
      # orchestrator:8080 address. Used for hook callbacks, cookies, and push.
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://localhost}
      # Exact browser origins allowed to open authenticated WebSockets. Keep this
      # separate from cookie transport settings; comma-separate additional exact
      # origins only when users intentionally browse through more than one URL.
      FLOCK_ALLOWED_ORIGINS: ${FLOCK_ALLOWED_ORIGINS:-https://localhost}
      # Isolated origin suffix for untrusted development-server content. For a
      # real domain, point wildcard DNS (*.preview.example.com) at this host.
      # Empty derives preview.localhost only when PUBLIC_BASE_URL is localhost;
      # public deployments must opt into their dedicated wildcard DNS suffix.
      FLOCK_PREVIEW_DOMAIN: ${FLOCK_PREVIEW_DOMAIN:-}
      # The base HTTP-01 profile cannot issue wildcard Preview certificates.
      # DNS-01 and external-proxy profiles explicitly enable hostname Preview.
      FLOCK_PREVIEW_BACKEND: ${FLOCK_PREVIEW_BACKEND:-disabled}
      FLOCK_PREVIEW_PORT_RANGE: ${FLOCK_PREVIEW_PORT_RANGE:-}
      FLOCK_PREVIEW_FRAME_SOURCES: ${FLOCK_PREVIEW_FRAME_SOURCES:-}
      FLOCK_PREVIEW_HOST: 0.0.0.0
      FLOCK_PREVIEW_PORT: 8081
      FLOCK_PREVIEW_PUBLIC_PORT: ${HTTPS_HOST_PORT:-}
      FLOCK_PREVIEW_TTL_MS: ${FLOCK_PREVIEW_TTL_MS:-28800000}
      FLOCK_PREVIEW_MAX_CONCURRENT: ${FLOCK_PREVIEW_MAX_CONCURRENT:-16}
      FLOCK_PREVIEW_MAX_CONNECTIONS: ${FLOCK_PREVIEW_MAX_CONNECTIONS:-32}
      FLOCK_PREVIEW_CONNECT_TIMEOUT_MS: ${FLOCK_PREVIEW_CONNECT_TIMEOUT_MS:-3000}
      FLOCK_PREVIEW_UPSTREAM_TIMEOUT_MS: ${FLOCK_PREVIEW_UPSTREAM_TIMEOUT_MS:-120000}
      FLOCK_PREVIEW_MAX_REQUEST_BYTES: ${FLOCK_PREVIEW_MAX_REQUEST_BYTES:-67108864}
      FLOCK_PREVIEW_MAX_RESPONSE_BYTES: ${FLOCK_PREVIEW_MAX_RESPONSE_BYTES:-67108864}
      # Secret-store master key (encryption at rest, NFR-SEC2). Prefer the file.
      FLOCK_MASTER_KEY: ${FLOCK_MASTER_KEY:-}
      FLOCK_MASTER_KEY_FILE: /run/secrets/flock_master_key
      FLOCK_MASTER_KEY_VERSION: ${FLOCK_MASTER_KEY_VERSION:-0}
      # Fresh-install ownership capability. The setup screen requires this
      # out-of-band token before it will create the sole administrator.
      FLOCK_SETUP_TOKEN_FILE: /run/secrets/setup_token
      # Session-cookie transport derives from the validated deployment mode; it
      # never relaxes FLOCK_ALLOWED_ORIGINS. The agentd version is SINGLE-SOURCED from the
      # COPYed agentd/VERSION (resolveAgentdVersion reads it when this is empty).
      # Do NOT bake a literal default here: a stale value shadows the shipped
      # binary's version → ensureRunning re-ships+relaunches the daemon on every
      # connect (kills live sessions). Leave empty unless intentionally overriding.
      FLOCK_AGENTD_VERSION: ${FLOCK_AGENTD_VERSION:-}
      # Experimental: run Claude Code over its structured stream-json transport
      # (dynamic/structured chat) instead of PTY+transcript. Off unless set.
      FLOCK_CLAUDE_STREAM: ${FLOCK_CLAUDE_STREAM:-}
      FLOCK_AGENTD_SOCKET: /run/flock-agentd/control.sock
      FLOCK_AGENTD_SECRET_FILE: /run/flock-agentd/control.key
      FLOCK_AGENTD_NODE_ID_FILE: /run/flock-agentd/node-id
      # Local agents use the same authenticated hook surface over the private
      # runtime network; this avoids treating localhost inside the runtime as the
      # orchestrator in IP-only and localhost deployments.
      FLOCK_LOCAL_HOOK_BASE_URL: http://orchestrator:8080
      # Orchestrator sits behind Traefik (one hop) → trust it so request.ip is the
      # real client (correct login-throttle keying + audit actor IP).
      FLOCK_TRUST_PROXY: ${FLOCK_TRUST_PROXY:-1}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@example.com}
    secrets:
      - flock_master_key
      - postgres_password
      - source: setup_token
        target: setup_token
    volumes:
      # Only the protected socket/identity/credential cross the runtime boundary.
      - 'flock_agentd_control:/run/flock-agentd:ro'
      # Operator-managed encrypted vault destination; keep it on separate storage.
      - '${FLOCK_BACKUP_DIR:-./backups}:/backups'
    tmpfs:
      - /tmp:size=512m,mode=1777
      - /run:size=32m,mode=0755
      - /home/flock-control/.cache:size=32m,uid=700,gid=700,mode=0700
    # NO public port mapping (US-39, NFR-SEC1): the orchestrator speaks plain
    # HTTP/WS and is reachable ONLY via the Traefik TLS proxy on the internal
    # network. `expose` documents the internal port without publishing it.
    expose:
      - '8080'
      - '8081'
    networks:
      - edge
      - data
      - runtime
    healthcheck:
      test:
        - 'CMD-SHELL'
        - 'node -e "fetch(''http://127.0.0.1:''+(process.env.PORT||8080)+''/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"'
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Web — static React/Vite PWA bundle served by nginx. Fronted by the Traefik
  # TLS proxy (US-39); Traefik routes /api + /ws to the orchestrator and
  # everything else here. NO public port mapping (NFR-SEC1).
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    image: ${FLOCK_IMAGE_REGISTRY:-ghcr.io/billiondollarsolo}/shepherd-web:${FLOCK_VERSION:-0.6.1}
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    depends_on:
      - orchestrator
    expose:
      - '80'
    tmpfs:
      - /var/lib/nginx/tmp:size=32m,uid=101,gid=101,mode=0750
      - /var/run:size=4m,uid=101,gid=101,mode=0750
      - /var/log/nginx:size=8m,uid=101,gid=101,mode=0750
    networks:
      - edge
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', '-T', '2', 'http://127.0.0.1/']
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 5s

# -----------------------------------------------------------------------------
# Named volumes
# -----------------------------------------------------------------------------
volumes:
  pgdata:
  # Separate durable agent runtime home and root-owned daemon control state.
  flock_agent_home:
  flock_agentd_state:
  flock_agentd_control:
  # Traefik ACME account and certificates (US-39, NFR-SEC1/DEP2). Persisted so
  # certs survive restarts and are never baked into an image.
  traefik_acme:

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  edge:
    name: ${FLOCK_EDGE_NETWORK_NAME:-shepherd_edge}
  data:
    name: ${FLOCK_DATA_NETWORK_NAME:-shepherd_data}
    internal: true
  runtime:
    name: ${FLOCK_RUNTIME_NETWORK_NAME:-shepherd_runtime}

# -----------------------------------------------------------------------------
# Secret files (NFR-DEP2) — populate these on the host before `compose up`.
# Each is mounted at /run/secrets/<name> inside the consuming container and is
# NEVER copied into an image. Create with e.g.:
#   mkdir -p secrets
#   openssl rand -base64 32 > secrets/flock_master_key
#   openssl rand -base64 48 > secrets/setup_token
#   printf '%s' 'strong-db-password' > secrets/postgres_password
# -----------------------------------------------------------------------------
secrets:
  flock_master_key:
    file: ./secrets/flock_master_key
  postgres_password:
    file: ./secrets/postgres_password
  setup_token:
    file: ./secrets/setup_token
